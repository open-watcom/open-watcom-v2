name: Project Live Sync
on:
  issues:
    types: [opened, edited, reopened, closed]
  #pull_request:
  pull_request_target:
    types: [opened, edited, reopened, closed]

env:
  GH_API_VERSION:     "2026-03-10" 
  PROJECT_ID:         "PVT_kwHOAB7H7M4BZk7B"
  UPDATEAT_FIELD_ID:  "PVTF_lAHOAB7H7M4BZk7BzhUmsLs"
  REPOMARK_FIELD_ID:  "PVTSSF_lAHOAB7H7M4BZk7BzhUjAmA"
  REPOMARK_OPTION_ID: "5f088986"

jobs:
  online_sync:
    runs-on: ubuntu-latest
    steps:
      # =========================================================================
      # EXTRA TASK: Fetch global metadata for both event types
      # =========================================================================
      - name: Get common parameters
        id:   conf
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_PROJECT_TOKEN }}
          PROJECT_URL: ${{ vars.GLOBAL_PROJECT_URL }}
        run: |
          # Resolve the true project owner from the provided PAT token
          owner=$(gh api user --jq '.login')
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "Project Owner resolved: $owner"

          # Extract the project number from your global variable URL
          projnum="${PROJECT_URL##*/}"
          echo "projnum=$projnum" >> "$GITHUB_OUTPUT"
          echo "Project Number resolved: $projnum"

          # Extract the project fields related data
          field_data=$(gh project field-list "$projnum" --owner "$owner" --format json)
          echo "DEBUG - Fields info: $field_data"

          status_id=$(echo "$field_data" | jq -r '.fields[] | select(.name == "Status") | .id')
          echo "status_id=$status_id" >> "$GITHUB_OUTPUT"
          echo "DEBUG - Status Field ID: $status_id"

          done_id=$(echo "$field_data" | jq -r --arg f_id "$status_id" '.fields[] | select(.id == $f_id) | .options[] | select(.name == "Done") | .id')
          echo "done_id=$done_id" >> "$GITHUB_OUTPUT"
          echo "DEBUG - Done Option ID: $done_id"

          if [ "$status_id" = "null" ] || [ "$done_id" = "null" ]; then
            echo "Error: Could not resolve all required database metadata IDs."
            exit 1
          fi

      # =========================================================================
      # TASK 1: Handle Issue Changes exclusively
      # =========================================================================
      - name: Propagate Issue to Project Database
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_PROJECT_TOKEN }}
        run: |
          echo "Project issue processing..."
          
          PRJ_ITEM_ID=$(gh project item-add "${{ steps.conf.outputs.projnum }}" --owner "${{ steps.conf.outputs.owner }}" --url "${{ github.event.issue.html_url }}" --format json --jq '.id')
          echo "Item linked successfully. Project Item ID: $PRJ_ITEM_ID"

          if [ "${{ github.event.issue.state }}" = "closed" ]; then
            echo "Item is closed. Moving item to Done column..."
            gh project item-edit --id "$PRJ_ITEM_ID" --project-id "$PROJECT_ID" --field-id "${{ steps.conf.outputs.status_id }}" --single-select-option-id "${{ steps.conf.outputs.done_id }}"
          fi

          RAW_TIME="${{ github.event.issue.updated_at }}"
          ISO_STRING=$(date -d "$RAW_TIME" +"%Y-%m-%d %H:%M")

          echo "Formatted issue timestamp: $ISO_STRING"
          echo "Writing timestamp to project..."

          gh project item-edit --id "$PRJ_ITEM_ID" --project-id "$PROJECT_ID" --field-id "$UPDATEAT_FIELD_ID" --text "$ISO_STRING"

          echo "📦 Source repository name: ${{ github.event.repository.name }}"
          echo "Updating RepoMark field..."

          gh project item-edit --id "$PRJ_ITEM_ID" --project-id "$PROJECT_ID" --field-id "$REPOMARK_FIELD_ID" --single-select-option-id "$REPOMARK_OPTION_ID"

      # =========================================================================
      # TASK 2: Handle PR Changes exclusively
      # =========================================================================
      - name: Propagate PR to Project Database
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_PROJECT_TOKEN }}
        run: |
          echo "Project PR processing..."
          
          PRJ_ITEM_ID=$(gh project item-add "${{ steps.conf.outputs.projnum }}" --owner "${{ steps.conf.outputs.owner }}" --url "${{ github.event.pull_request.html_url }}" --format json --jq '.id')
          echo "Item linked successfully. Project Item ID: $PRJ_ITEM_ID"

          if [ "${{ github.event.pull_request.state }}" = "closed" ]; then
            echo "Item is closed. Moving item to Done column..."
            gh project item-edit --id "$PRJ_ITEM_ID" --project-id "$PROJECT_ID" --field-id "${{ steps.conf.outputs.status_id }}" --single-select-option-id "${{ steps.conf.outputs.done_id }}"
          fi

          RAW_TIME="${{ github.event.pull_request.updated_at }}"
          ISO_STRING=$(date -d "$RAW_TIME" +"%Y-%m-%d %H:%M")

          echo "Formatted PR timestamp: $ISO_STRING"
          echo "Writing timestamp to project..."

          gh project item-edit --id "$PRJ_ITEM_ID" --project-id "$PROJECT_ID" --field-id "$UPDATEAT_FIELD_ID" --text "$ISO_STRING"

          echo "📦 Source repository name: ${{ github.event.repository.name }}"
          echo "Updating RepoMark field..."

          gh project item-edit --id "$PRJ_ITEM_ID" --project-id "$PROJECT_ID" --field-id "$REPOMARK_FIELD_ID" --single-select-option-id "$REPOMARK_OPTION_ID"
