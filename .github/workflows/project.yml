name: Live Project Sync
on:
  issues:
    types: [opened, edited, reopened, closed]
  pull_request:
    types: [opened, edited, reopened, closed]

jobs:
  online_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Propagate Item to Project Database
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_PROJECT_TOKEN }}
          PROJECT_URL: ${{ vars.GLOBAL_PROJECT_URL }}
          ITEM_ID: ${{ github.event.issue.node_id || github.event.pull_request.node_id }}
          STATE: ${{ github.event.issue.state || github.event.pull_request.state }}
          GH_API_VERSION: "2026-03-10" 
        run: |
          # 1. Extract the project number from your global variable URL
          PROJECT_NUMBER="${PROJECT_URL##*/}"
          echo "🔄 Linking item to Project board #$PROJECT_NUMBER..."

          # 2. Add the item using the native GitHub CLI project system
          ITEM_URL="${{ github.event.issue.html_url || github.event.pull_request.html_url }}"
          PRJ_ITEM_ID=$(gh project item-add "$PROJECT_NUMBER" --owner "@me" --url "$ITEM_URL" --format json --jq '.id')
          echo "✅ Item linked successfully. Project Item ID: $PRJ_ITEM_ID"

          # 3. Handle the close event via refined ID extraction
          if [ "$STATE" = "closed" ]; then
            echo "🏁 Item is closed. Resolving structural field IDs..."
            
            # FIX: Fetch the actual project root object to get the real non-null Global Project ID
            PRJ_ID=$(gh project view "$PROJECT_NUMBER" --owner "@me" --format json --jq '.id')
            
            # Fetch the field layout data structure
            FIELD_DATA=$(gh project field-list "$PROJECT_NUMBER" --owner "@me" --format json)
            
            # Parse the status field and target option values
            STATUS_FIELD_ID=$(echo "$FIELD_DATA" | jq -r '.fields[] | select(.name == "Status") | .id')
            DONE_OPTION_ID=$(echo "$FIELD_DATA" | jq -r --arg f_id "$STATUS_FIELD_ID" '.fields[] | select(.id == $f_id) | .options[] | select(.name == "Done") | .id')

            echo "DEBUG - Project ID: $PRJ_ID"
            echo "DEBUG - Status Field ID: $STATUS_FIELD_ID"
            echo "DEBUG - Done Option ID: $DONE_OPTION_ID"

            # Failsafe validation
            if [ "$PRJ_ID" = "null" ] || [ "$STATUS_FIELD_ID" = "null" ] || [ "$DONE_OPTION_ID" = "null" ]; then
              echo "❌ Error: Could not resolve all required database metadata IDs."
              exit 1
            fi

            echo "Moving item to Done column..."
            gh project item-edit --id "$PRJ_ITEM_ID" --project-id "$PRJ_ID" --field-id "$STATUS_FIELD_ID" --single-select-option-id "$DONE_OPTION_ID"
          fi
