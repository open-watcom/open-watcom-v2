name: Live Project Sync
on:
  issues:
    types: [opened, edited, reopened, closed]
  pull_request:
    types: [opened, edited, reopened, closed]

jobs:
  online_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Propagate Item to Project Database
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_PROJECT_TOKEN }}
          PROJECT_URL: ${{ vars.GLOBAL_PROJECT_URL }}
          ITEM_ID: ${{ github.event.issue.node_id || github.event.pull_request.node_id }}
          STATE: ${{ github.event.issue.state || github.event.pull_request.state }}
        run: |
          # 1. Safely extract the project number from your global variable URL
          PROJECT_NUMBER="${PROJECT_URL##*/}"
          echo "🔄 Linking item to Project board #$PROJECT_NUMBER..."

          # 2. Add the item using the native GitHub CLI project system (using owner and URL flags)
          ITEM_URL="${{ github.event.issue.html_url || github.event.pull_request.html_url }}"
          
          PRJ_ITEM_ID=$(gh project item-add "$PROJECT_NUMBER" --owner "@me" --url "$ITEM_URL" --format json --jq '.id')
          echo "✅ Item linked successfully. Project Item ID: $PRJ_ITEM_ID"

          # 3. Handle the close event via raw GraphQL to guarantee flag compatibility
          if [ "$STATE" = "closed" ]; then
            echo "🏁 Item is closed. Resolving structural field IDs..."
            
            # Fetch the project structure to find the internal ID of the 'Status' column and 'Done' option
            PROJECT_DATA=$(gh project field-list "$PROJECT_NUMBER" --owner "@me" --format json)
            STATUS_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '.fields[] | select(.name == "Status") | .id')
            DONE_OPTION_ID=$(echo "$PROJECT_DATA" | jq -r --arg f_id "$STATUS_FIELD_ID" '.fields[] | select(.id == $f_id) | .options[] | select(.name == "Done") | .id')

            echo "Moving item to Done column..."
            gh project item-edit --id "$PRJ_ITEM_ID" --project-id $(echo "$PROJECT_DATA" | jq -r '.id') --field-id "$STATUS_FIELD_ID" --single-select-option-id "$DONE_OPTION_ID"
          fi
