name: "CodeQL Advanced Static Analysis"

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build-database:
    name: Build DB
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    outputs:
      db-path: ${{ steps.variables.outputs.db-path }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: 'cpp'
        db-location: ${{runner.temp}}/mycodeql
        build-mode: manual
        queries: security-extended
        #config-file: .github/codeql/config.yml

    - name: Set up Environment and Build Bootstrap
      run: |
        sudo apt-get update
        sudo apt-get install -y dosbox ltrace
        
        echo "=== Compiler Info ==="
        gcc -v
        
        echo "=== build.sh boot ==="
        . ci/codeql.sh

      env:
        OWROOT:     ${{github.workspace}}
        OWTOOLS:    GCC
        OWDOSBOX:   dosbox
        OWVERBOSE:  1

    # save the finished database as a GitHub Actions artifact
    - name: Upload databįze
      uses: actions/upload-artifact@v4
      with:
        name: codeql-database-artifact
        path: ${{runner.temp}}/mycodeql
        retention-days: 1

  analyze:
    needs: build-database
    name: CodeQL Static Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - chunk_name: all-queries
            query_path: security-extended
            category: "/language:cpp"
            config_file: .github/codeql/config.yml
            #skip_queries: false
          - chunk_name: "qry-1"
            query_path: "cpp/unbounded-write"
            category: "/query:qry-1"
            config_file: .github/codeql/config1.yml
            #skip_queries: true
          - chunk_name: "qry-2"
            query_path: "cpp/overrun-write"
            category: "/query:qry-2"
            config_file: .github/codeql/config2.yml
            #skip_queries: true
          - chunk_name: "qry-3"
            query_path: "cpp/path-injection"
            category: "/query:qry-3"
            config_file: .github/codeql/config3.yml
            #skip_queries: true
          - chunk_name: "qry-4"
            query_path: "cpp/tainted-format-string"
            category: "/query:qry-4"
            config_file: .github/codeql/config4.yml
            #skip_queries: true
          - chunk_name: "qry-5"
            query_path: "cpp/uncontrolled-allocation-size"
            category: "/query:qry-5"
            config_file: .github/codeql/config5.yml
            #skip_queries: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    # Inicializace CodeQL (pouze pro nastavenķ binįrek, nekompiluje se)
    - name: Initialize CodeQL CLI
      uses: github/codeql-action/init@v4
      with:
        languages: 'cpp'
        db-location: ${{runner.temp}}/mycodeql
        queries: ${{ matrix.query_path }}
        build-mode: manual
        config-file: ${{ matrix.config_file }}

    # Stįhneme hotovou databįzi z prvnķho jobu
    - name: Download databįze
      uses: actions/download-artifact@v4
      with:
        name: codeql-database-artifact
        path: ${{runner.temp}}/mycodeql

    # run the analysis itself on the finished database
    - name: Perform CodeQL Analysis
      continue-on-error: true
      uses: github/codeql-action/analyze@v4
      with:
        category: ${{ matrix.category }}
        #skip-queries: ${{ matrix.skip_queries }}
        # upload: true
        # ram: 14575
        # threads: 4
      env:
        CODEQL_ACTION_EXTRA_OPTIONS: '{"database": {"run-queries": ["--timeout=14400"]}}'
