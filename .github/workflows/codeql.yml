name: 'CodeQL Advanced Static Analysis'

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

env:
  DB_PATH: 'mycodeql'

jobs:
  build-database:
    name: Build DB
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up OW Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y dosbox ltrace
        
        echo "=== Compiler Info ==="
        gcc -v

    - name: Setup CodeQL CLI
      id: codeql
      uses: github/codeql-action/setup-codeql@v4

    - name: Create CodeQL Database
      run: |
        ${{ steps.codeql.outputs.codeql-path }} database create "${{ runner.temp }}/${{ env.DB_PATH }}" \
          --language=cpp \
          --no-run-unnecessary-builds \
          --command="./ci/codeql.sh"
      env:
        OWROOT:     ${{github.workspace}}
        OWTOOLS:    GCC
        OWDOSBOX:   dosbox
        OWVERBOSE:  1

    # save the finished database as a GitHub Actions artifact
    - name: Upload database
      uses: actions/upload-artifact@v6
      with:
        name: codeql-database-artifact
        path: ${{ runner.temp }}/${{ env.DB_PATH }}
        retention-days: 1

  analyze-database:
    needs: build-database
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - category: 'all-cpp'
            query_selection: '.github/codeql/queryf1.qls'
            threads: 0
            extra_opts: '--timeout=300'
          - category: 'qry-1-cpp'
            #query_selection: '.github/codeql/custom/UnboundedWriteFast.ql'
            #query_selection: 'codeql/cpp-queries:Security/CWE/CWE-120/UnboundedWrite.ql'
            #query_selection: '.github/codeql/custom/TestBufferWrite.ql'
            #query_selection: '.github/codeql/custom/TestTaintTracking.ql'
            #query_selection: '.github/codeql/custom/UnboundedWriteStrcpyFast.ql'
            query_selection: '.github/codeql/custom/FastUnboundedWrite3.ql'
            threads: 1
            #extra_opts: '--timeout=1800 --additional-packs=.github/codeql --extension-packs=custom-cpp-queries'
            #extra_opts: '--timeout=1800 -J=-Dcodeql.dataflow.maxEvaluationSteps=10000 -J=-Dcodeql.dataflow.maxExplorationDepth=10'
            extra_opts: '--timeout=1800'
            # Pass low-level pruning options straight to the query compilation server
            #java_args:   '-Dcodeql.dataflow.maxEvaluationSteps=10000 -Dcodeql.dataflow.maxExplorationDepth=10'
          - category: "qry-2-cpp"
            query_selection: 'codeql/cpp-queries:Security/CWE/CWE-119/OverrunWriteProductFlow.ql'
            threads: 1
            extra_opts: '--timeout=100'
          - category: "qry-3-cpp"
            query_selection: 'codeql/cpp-queries:Security/CWE/CWE-022/TaintedPath.ql'
            threads: 1
            extra_opts: '--timeout=100'
          - category: "qry-4-cpp"
            query_selection: 'codeql/cpp-queries:Security/CWE/CWE-134/UncontrolledFormatString.ql'
            threads: 1
            extra_opts: '--timeout=100'
          - category: "qry-5-cpp"
            query_selection: 'codeql/cpp-queries:Security/CWE/CWE-190/TaintedAllocationSize.ql'
            threads: 1
            extra_opts: '--timeout=100'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup CodeQL CLI
      id: codeql
      uses: github/codeql-action/setup-codeql@v4

    - name: Download CodeQL Query Packs
      run: |
        ${{ steps.codeql.outputs.codeql-path }} pack download codeql/cpp-queries

    - name: Download Database Artifact
      uses: actions/download-artifact@v8
      with:
        name: codeql-database-artifact
        path: ${{ runner.temp }}/${{ env.DB_PATH }}

    - name: Install query dependencies
      run: |
        ${{ steps.codeql.outputs.codeql-path }} pack install .github/codeql/custom

    - name: Run Matrix Security Analysis
      continue-on-error: true
      run: |
        ${{ steps.codeql.outputs.codeql-path }} database analyze "${{ runner.temp }}/${{ env.DB_PATH }}" \
          ${{ matrix.query_selection }} \
          --format=sarif-latest \
          --output=results-${{ matrix.category }}.sarif \
          --tuple-counting \
          --verbosity=progress++ \
          --evaluator-log=evaluator-${{ matrix.category }}.log \
          ${{ matrix.extra_opts }} \
          --ram=14000 \
          --threads=${{ matrix.threads }}
      env:
        CODEQL_JAVA_ARGS: ${{ matrix.java_args }}

    - name: Upload evaluator log
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: evaluator-${{ matrix.category }}
        path: evaluator-${{ matrix.category }}.log

    - name: Upload Results to GitHub
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: results-${{ matrix.category }}.sarif
        category: ${{ matrix.category }}
