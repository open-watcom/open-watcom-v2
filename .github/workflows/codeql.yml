name: "CodeQL Advanced Static Analysis"

on:
  schedule:
    - cron: '0 1 * * *' # Automatické spuštení každý den v 01:00 UTC
  workflow_dispatch:   # Umožnuje rucní spuštení z webu GitHubu kdykoliv

jobs:
  analyze:
    name: CodeQL Static Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: 'c-cpp'
        build-mode: manual
        queries: security-extended

    - name: Set up Environment and Build Bootstrap
      run: |
        sudo apt-get update
        sudo apt-get install -y dosbox ltrace
        
        echo "=== Compiler Info ==="
        gcc -v
        
        echo "=== build.sh boot ==="
        . ci/codeql.sh

      env:
        OWROOT:     ${{github.workspace}}
        OWTOOLS:    GCC
        OWDOSBOX:   dosbox
        OWVERBOSE:  1

    - name: Clean Workspace Before Analysis
      run: |
        git clean -xdf -e .codeql/ # Smaže mezivýsledky kompilace, ale zachová CodeQL DB

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:cpp"
      env:
        CODEQL_ACTION_EXTRA_OPTIONS: '{"database": {"run-queries": ["--timeout=600"]}}'
