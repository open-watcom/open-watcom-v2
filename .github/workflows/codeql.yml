name: "CodeQL Advanced Static Analysis"

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

env:
  DB_PATH: mycodeql

jobs:
  build-database:
    name: Build DB
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup CodeQL CLI
      uses: github/codeql-action/setup-codeql@v4

    - name: Set up OW Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y dosbox ltrace
        
        echo "=== Compiler Info ==="
        gcc -v

   - name: Create CodeQL Database
     run: |
       codeql database create "${{ runner.temp }}/${{ env.DB_PATH }}" \
         --language=cpp \
         --no-run-unnecessary-builds \
         --command="./ci/codeql.sh"
      env:
        OWROOT:     ${{github.workspace}}
        OWTOOLS:    GCC
        OWDOSBOX:   dosbox
        OWVERBOSE:  1

    # save the finished database as a GitHub Actions artifact
    - name: Upload database
      uses: actions/upload-artifact@v6
      with:
        name: codeql-database-artifact
        path: ${{ runner.temp }}/${{ env.DB_PATH }}
        retention-days: 1

  analyze-database:
    needs: build-database
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - category: "all-cpp"
            query_selection: '.github/codeql/filtered-security.qls'
          - category: "qry-1-cpp"
            query_selection: '--query-filters="include:id cpp/unbounded-write" codeql/cpp-queries'
          - category: "qry-2-cpp"
            query_selection: '--query-filters="include:id cpp/overrun-write" codeql/cpp-queries'
          - category: "qry-3-cpp"
            query_selection: '--query-filters="include:id cpp/path-injection" codeql/cpp-queries'
          - category: "qry-4-cpp"
            query_selection: '--query-filters="include:id cpp/tainted-format-string" codeql/cpp-queries'
          - category: "qry-5-cpp"
            query_selection: '--query-filters="include:id cpp/uncontrolled-allocation-size" codeql/cpp-queries'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup CodeQL CLI
      uses: github/codeql-action/setup-codeql@v4

    - name: Download CodeQL Query Packs
      run: |
        codeql pack download codeql/cpp-queries

    - name: Download Database Artifact
      uses: actions/download-artifact@v8
      with:
        name: codeql-database-artifact
        path: ${{ runner.temp }}/${{ env.DB_PATH }}

    - name: Run Matrix Security Analysis
      run: |
        codeql database analyze "${{ runner.temp }}/${{ env.DB_PATH }}" \
          ${{ matrix.query_selection }} \
          --format=sarif-latest \
          --output=results-${{ matrix.category }}.sarif
      env:
        CODEQL_ACTION_EXTRA_OPTIONS: '{"database": {"run-queries": ["--timeout=400"]}}'

    - name: Upload Results to GitHub
      run: |
        codeql github upload-results \
          --repository="${{ github.repository }}" \
          --ref="${{ github.ref }}" \
          --commit="${{ github.sha }}" \
          --sarif=results-${{ matrix.category }}.sarif \
          --category="${{ matrix.category }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
