name: "CodeQL Advanced Static Analysis"

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  analyze:
    name: CodeQL Static Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: 'c-cpp'
        build-mode: manual
        queries: security-extended

    - name: Set up Environment and Build Bootstrap
      run: |
        sudo apt-get update
        sudo apt-get install -y dosbox ltrace
        
        echo "=== Compiler Info ==="
        gcc -v
        
        echo "=== build.sh boot ==="
        . ci/codeql.sh

      env:
        OWROOT:     ${{github.workspace}}
        OWTOOLS:    GCC
        OWDOSBOX:   dosbox
        OWVERBOSE:  1

    - name: Clean Workspace Before Analysis
      run: |
        git clean -xdf -e .codeql/ # SmaĹľe mezivĂ˝sledky kompilace, ale zachovĂˇ CodeQL DB

    - name: Perform CodeQL Analysis via CLI
      continue-on-error: true # Ignoruje kód 33 (vypršení nekterých dotazu)
      run: |
        mkdir -p results
        
        $CODEQL_DIST/codeql database analyze \
          /home/runner/work/_temp/codeql_databases/cpp \
          cpp-security-extended.qls \
          --format=sarif-latest \
          --output=results/cpp.sarif \
          --ram=14575 \
          --threads=4 \
          --timeout=400 \
          -v

    - name: Upload CodeQL Results Manually
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: results/cpp.sarif
        category: "/language:cpp"
