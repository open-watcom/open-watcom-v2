name: Project Date Backfill
on:
  workflow_dispatch:

env:
  GH_TOKEN: ${{ secrets.GLOBAL_PROJECT_TOKEN }}
  PROJECT_NUMBER: 1
  PROJECT_ID: "PVT_kwHOAB7H7M4BZk7B"
  UPDATEAT_FIELD_ID: "PVTF_lAHOAB7H7M4BZk7BzhUmsLs"

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Process All Project Items
        run: |
          echo "📥 Fetching items from project..."
          ITEMS=$(gh project item-list "${{ env.PROJECT_NUMBER }}" --owner "@me" --format json --limit 100)
          
          # Načteme položky do čistého pole, abychom se vyhnuli problémům s rourou (pipe)
          echo "$ITEMS" | jq -c '.items[]' | while read -r item; do
              ITEM_ID=$(echo "$item" | jq -r '.id')
              CONTENT_TYPE=$(echo "$item" | jq -r '.content.type')
              
              if [ "$CONTENT_TYPE" = "Issue" ] || [ "$CONTENT_TYPE" = "PullRequest" ]; then
                  URL=$(echo "$item" | jq -r '.content.url')
                  
                  # OPRAVA: Správné oříznutí domény na API cestu (repos/owner/repo/...)
                  API_PATH=$(echo "$URL" | sed 's|https://github.com/|repos/|')
                  
                  echo "Processing: $URL"
                  
                  # FIX: Přidáno < /dev/null aby gh api nekonzumovalo stdin cyklu
                  RAW_TIME=$(gh api "$API_PATH" --jq '.updated_at' < /dev/null 2>/dev/null)
                  
                  if [ -n "$RAW_TIME" ] && [ "$RAW_TIME" != "null" ]; then
                      ISO_STRING=$(date -d "$RAW_TIME" +"%Y-%m-%d %H:%M")
                      echo "   ↳ Setting time to: $ISO_STRING"
                      
                      # FIX: Přidáno < /dev/null také pro item-edit
                      gh project item-edit --id "$ITEM_ID" --project-id "${{ env.PROJECT_ID }}" --field-id "${{ env.UPDATEAT_FIELD_ID }}" --text "$ISO_STRING" < /dev/null > /dev/null
                  else
                      echo "   ⚠️ Could not fetch updated_at for $URL"
                  fi
              fi
          done
          echo "✅ All items processed successfully!"
