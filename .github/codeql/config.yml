name: "Open Watcom CodeQL Custom Config"

# Exclude queries which timeout (Exit code 33)
query-filters:
  - exclude:
      query path:
        - "*/UnboundedWrite"
        - "*/OverrunWriteProductFlow"
        - "*/TaintedPath"
        - "*/UncontrolledFormatString"
        - "*/TaintedAllocationSize"
