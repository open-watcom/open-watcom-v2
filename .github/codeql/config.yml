name: "Open Watcom CodeQL Custom Config"

# Exclude queries which timeout (Exit code 33)
queries:
  - name: Security Extended Queries
    uses: security-extended

query-filters:
  - exclude:
      id: cpp/overrun-write-product-flow
  - exclude:
      id: cpp/tainted-path
  - exclude:
      id: cpp/unbounded-write
  - exclude:
      id: cpp/uncontrolled-format-string
  - exclude:
      id: cpp/tainted-allocation-size
