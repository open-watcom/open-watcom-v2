#name: "Open Watcom CodeQL Custom Config"
# Exclude queries which timeout (Exit code 33)
query-filters:
  - exclude:
    id: cpp/unbounded-write
  - exclude:
    id: cpp/overrun-write
  - exclude:
    id: cpp/path-injection
  - exclude:
    id: cpp/tainted-format-string
  - exclude:
    id: cpp/uncontrolled-allocation-size
